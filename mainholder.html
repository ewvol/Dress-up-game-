<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Up Game!</title>
    <link rel="stylesheet" href="mainstyle.css">
</head>
<body>
    <div id="model">
        <img id="accessories">
        <img id="fronthair" src="frontbraids.png">
        <img id="top">
        <img id="bottoms">
        <img id="shoes">
        <img id="base" src="baseChara.png">
        <img id="backhair" src="backbraids.png">
    </div>
    <div id="choices">
    <div id="nav">
    <button class="tablink" onclick="changecategory(event,'shirttab')"> Shirts</button>
    <button class="tablink" onclick="changecategory(event,'pantstab')"> Pants </button>
    </div>
    <div id="newoptions">
        <div id="shirttab" class="meow">
            <img src="starShirt.png" onclick="wearshirt(1)">
            <img src="https://placehold.co/100x100/orange/black" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/magenta/white" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/orange/black" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/orange/black" onclick="wearshirt(3)">
        </div>
        <div id="pantstab" class="meow">
            <img src="https://placehold.co/100x100/pink/black" onclick="wearshirt(1)">
            <img src="https://placehold.co/100x100/pink/black" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/magenta/white" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/pink/black" onclick="wearshirt(3)">
            <img src="https://placehold.co/100x100/pink/black" onclick="wearshirt(3)">
        </div>
    </div>
    </div>
    <script src="game.js"> </script>
</body>
</html>
